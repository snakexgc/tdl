<section class="view" id="view-config">
  <header class="page-head">
    <div>
      <h1>配置文件</h1>
      <p>按字段修改配置。密码、密钥等敏感项留空时会保留原值。</p>
    </div>
    <div class="actions">
      <button class="btn secondary" id="reload-config" type="button">重新读取</button>
      <button class="btn danger" id="reboot" type="button">重启生效</button>
      <button class="btn primary" id="save-config" type="button">保存配置</button>
    </div>
  </header>
  <div class="notice" id="config-status"></div>
  <form id="config-form" class="config-form"></form>
</section>
