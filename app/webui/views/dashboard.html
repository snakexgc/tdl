<section class="view active" id="view-dashboard">
  <header class="page-head">
    <div>
      <h1>仪表盘</h1>
    </div>
    <button class="btn secondary" id="refresh-dashboard" type="button">刷新</button>
  </header>
  <div class="notice" id="dashboard-status"></div>
  <div class="dashboard-grid">
    <section class="dashboard-card">
      <div class="dashboard-card-head">
        <div>
          <h2>CPU</h2>
          <p id="dashboard-cpu-meta">最近 30 秒</p>
        </div>
        <strong id="dashboard-cpu-value">-</strong>
      </div>
      <div class="dashboard-chart-shell">
        <svg class="dashboard-chart" id="dashboard-cpu-chart" viewBox="0 0 640 160" role="img" aria-label="CPU 最近 30 秒曲线"></svg>
      </div>
    </section>
    <section class="dashboard-card">
      <div class="dashboard-card-head">
        <div>
          <h2>内存</h2>
          <p id="dashboard-memory-meta">总用量 / 软件用量 / HTTP buffer / 保留堆</p>
        </div>
        <strong id="dashboard-memory-value">-</strong>
      </div>
      <div class="dashboard-chart-shell">
        <svg class="dashboard-chart" id="dashboard-memory-chart" viewBox="0 0 640 160" role="img" aria-label="内存最近 30 秒曲线"></svg>
      </div>
      <div class="dashboard-legend">
        <span><i class="legend-total"></i>总用量</span>
        <span><i class="legend-software"></i>软件用量</span>
        <span><i class="legend-buffer"></i>HTTP buffer</span>
        <span><i class="legend-retained"></i>保留堆</span>
      </div>
    </section>
    <section class="dashboard-card dashboard-pull-card">
      <div class="dashboard-card-head dashboard-card-head-plain">
        <div>
          <h2>拉取状态</h2>
          <p id="dashboard-aria2-tasks-meta">aria2：活动 0 · 等待 0 · 停止 0</p>
        </div>
      </div>
      <div class="dashboard-stat-bars">
        <div class="dashboard-stat-row">
          <div class="dashboard-stat-line">
            <span>活跃分片请求</span>
            <strong id="dashboard-active-chunks-value">-</strong>
          </div>
          <div class="dashboard-stat-track">
            <i class="dashboard-stat-fill" id="dashboard-active-chunks-bar"></i>
          </div>
        </div>
        <div class="dashboard-stat-row">
          <div class="dashboard-stat-line">
            <span>近10秒错误</span>
            <strong id="dashboard-file-errors-10s-value">-</strong>
          </div>
          <div class="dashboard-stat-track">
            <i class="dashboard-stat-fill dashboard-stat-fill-danger" id="dashboard-file-errors-10s-bar"></i>
          </div>
        </div>
        <div class="dashboard-stat-row">
          <div class="dashboard-stat-line">
            <span>错误总数</span>
            <strong id="dashboard-file-errors-value">-</strong>
          </div>
          <div class="dashboard-stat-track">
            <i class="dashboard-stat-fill dashboard-stat-fill-warning" id="dashboard-file-errors-bar"></i>
          </div>
        </div>
        <div class="dashboard-stat-row">
          <div class="dashboard-stat-line">
            <span>aria2任务数</span>
            <strong id="dashboard-aria2-tasks-value">-</strong>
          </div>
          <div class="dashboard-stat-track">
            <i class="dashboard-stat-fill dashboard-stat-fill-muted" id="dashboard-aria2-tasks-bar"></i>
          </div>
        </div>
      </div>
    </section>
    <section class="dashboard-card">
      <div class="dashboard-card-head">
        <div>
          <h2>下载速度</h2>
          <p id="dashboard-speed-meta">gotd / aria2</p>
        </div>
        <strong id="dashboard-speed-value">-</strong>
      </div>
      <div class="dashboard-chart-shell">
        <svg class="dashboard-chart" id="dashboard-speed-chart" viewBox="0 0 640 160" role="img" aria-label="下载速度最近 30 秒曲线"></svg>
      </div>
      <div class="dashboard-legend">
        <span><i class="legend-gotd"></i>gotd</span>
        <span><i class="legend-aria2"></i>aria2</span>
      </div>
    </section>
  </div>
</section>
