<section class="view" id="view-update">
  <header class="page-head">
    <div>
      <h1>检查更新</h1>
      <p>查看当前版本，发现新版本后可以下载并重启到新版。</p>
    </div>
    <div class="actions">
      <button class="btn secondary" id="check-update" type="button">检查更新</button>
      <button class="btn primary" id="apply-update" type="button" disabled>下载并更新</button>
    </div>
  </header>
  <div class="notice" id="update-status"></div>
  <div class="info-grid" id="update-info"></div>
  <section class="update-notes-shell">
    <h2>Release Notes</h2>
    <pre id="update-notes" class="update-notes"></pre>
  </section>
</section>
