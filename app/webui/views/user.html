<section class="view active" id="view-user">
  <header class="page-head">
    <div>
      <h1>用户管理</h1>
      <p>查看当前 Telegram 账号状态，或直接在面板中完成登录。</p>
    </div>
  </header>
  <div class="tabs">
    <button class="tab-button active" data-user-tab="current" type="button">当前用户</button>
    <button class="tab-button" data-user-tab="login" type="button">用户登录</button>
  </div>
  <div class="user-tab active" id="user-tab-current">
    <section class="user-switch">
      <label class="field-inline user-switch-field">
        <span>选择用户</span>
        <select id="switch-namespace">
          <option value="">正在读取已登录用户...</option>
        </select>
      </label>
      <div class="user-switch-copy">
        <h2>切换或删除用户</h2>
        <p>选择已登录用户，可切换并重启，也可以删除不再需要的登录数据。</p>
      </div>
      <div class="user-switch-actions">
        <button class="btn primary" id="switch-user" type="button">切换并重启</button>
        <button class="btn danger" id="delete-user" type="button">删除用户</button>
      </div>
    </section>
    <div class="section-actions">
      <button class="btn secondary" id="refresh-user" type="button">重新检查</button>
    </div>
    <div class="notice" id="user-status"></div>
    <div class="info-grid" id="user-info"></div>
  </div>
  <div class="user-tab" id="user-tab-login">
    <section class="login-flow">
      <div class="login-flow-head">
        <div>
          <h2>登录用户</h2>
          <p>用户名会作为本地数据空间，只允许英文字母。</p>
        </div>
        <label class="field-inline login-namespace-field">
          <span>用户名</span>
          <input id="login-namespace" type="text" pattern="[A-Za-z]+" placeholder="alice" autocomplete="off">
        </label>
      </div>

      <ol class="login-steps" aria-label="登录步骤">
        <li data-login-step="method" class="is-current"><span>1</span>填写手机号</li>
        <li data-login-step="auth"><span>2</span>验证码</li>
        <li data-login-step="password"><span>3</span>2FA</li>
        <li data-login-step="finish"><span>4</span>完成</li>
      </ol>

      <div class="login-meta" id="login-meta"></div>

      <div class="login-stage">
        <section class="login-step-panel" id="login-step-method">
          <div class="login-step-copy">
            <h3 id="login-method-title">验证码登录</h3>
            <p id="login-method-copy">输入完整手机号后，继续填写 Telegram 收到的验证码。</p>
          </div>
          <div id="login-phone-start" class="login-form-panel">
            <label class="field-inline">
              <span>手机号</span>
              <input id="login-phone" type="text" placeholder="+8613800000000" autocomplete="tel">
            </label>
            <button class="btn primary" id="start-phone-login" type="button">发送验证码</button>
          </div>
        </section>

        <section class="login-step-panel" id="login-step-code" hidden>
          <div class="login-step-copy">
            <h3>输入验证码</h3>
            <p>请填写 Telegram 发送的原始验证码。</p>
          </div>
          <label class="field-inline">
            <span>验证码</span>
            <input id="login-code" type="text" inputmode="numeric" placeholder="Telegram 验证码" autocomplete="one-time-code">
          </label>
          <button class="btn primary" id="submit-login-code" type="button">提交验证码</button>
        </section>

        <section class="login-step-panel" id="login-step-password" hidden>
          <div class="login-step-copy">
            <h3>输入 2FA 密码</h3>
            <p>此账号开启了两步验证。</p>
          </div>
          <label class="field-inline">
            <span>密码</span>
            <input id="login-password" type="password" placeholder="Telegram 2FA 密码" autocomplete="current-password">
          </label>
          <button class="btn primary" id="submit-login-password" type="button">提交密码</button>
        </section>

        <section class="login-step-panel" id="login-step-result" hidden>
          <div class="login-result-mark" id="login-result-mark">✓</div>
          <div class="login-step-copy">
            <h3 id="login-result-title">登录成功</h3>
            <p id="login-result-copy">用户状态已更新。</p>
          </div>
          <div class="login-result-actions">
            <button class="btn secondary" id="restart-login-flow" type="button">重新开始</button>
            <button class="btn primary" id="finish-login-flow" type="button">完成</button>
          </div>
        </section>
      </div>

      <div class="notice" id="login-status" role="status" aria-live="polite"></div>
      <div class="login-actions">
        <button class="btn danger" id="cancel-login" type="button" hidden>取消当前登录</button>
      </div>
    </section>
  </div>
</section>
