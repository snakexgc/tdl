<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>登录 TDL 管理面板</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/base.css">
  <style>
    .auth-bg-grid {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
    }
    .auth-bg-grid::before {
      content: "";
      position: absolute;
      inset: -50%;
      background-image:
        linear-gradient(rgba(20, 184, 166, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(20, 184, 166, 0.04) 1px, transparent 1px);
      background-size: 56px 56px;
      animation: grid-drift 24s linear infinite;
    }
    @keyframes grid-drift {
      from { transform: translate(0, 0); }
      to   { transform: translate(56px, 56px); }
    }
    .auth-bg-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(72px);
      opacity: 0.55;
      animation: orb-float 9s ease-in-out infinite alternate;
    }
    .auth-bg-orb:nth-child(1) {
      width: 320px; height: 320px;
      top: 8%; left: 12%;
      background: radial-gradient(circle, rgba(13, 148, 136, 0.3), rgba(13, 148, 136, 0.05));
    }
    .auth-bg-orb:nth-child(2) {
      width: 260px; height: 260px;
      bottom: 12%; right: 8%;
      background: radial-gradient(circle, rgba(52, 211, 153, 0.22), rgba(52, 211, 153, 0.04));
      animation-delay: -4.5s;
    }
    .auth-bg-orb:nth-child(3) {
      width: 180px; height: 180px;
      top: 55%; left: 60%;
      background: radial-gradient(circle, rgba(20, 184, 166, 0.15), transparent);
      animation-delay: -2s;
    }
    @keyframes orb-float {
      from { transform: translateY(0) scale(1); }
      to   { transform: translateY(-28px) scale(1.06); }
    }
    .auth-shell { position: relative; z-index: 1; }
  </style>
</head>
<body class="auth-page">
  <div class="auth-bg-grid" aria-hidden="true">
    <div class="auth-bg-orb"></div>
    <div class="auth-bg-orb"></div>
    <div class="auth-bg-orb"></div>
  </div>
  <main class="auth-shell">
    <section class="auth-panel" aria-labelledby="auth-title">
      <div class="auth-brand">
        <div class="brand-mark">TDL</div>
        <div>
          <div class="brand-title">管理面板</div>
          <div class="brand-subtitle">安全登录</div>
        </div>
      </div>
      <form id="webui-login-form" class="auth-form">
        <div>
          <h1 id="auth-title">登录</h1>
          <p>请输入 WebUI 用户名和密码。</p>
        </div>
        <label class="field-inline">
          <span>用户名</span>
          <input id="webui-username" name="username" type="text" autocomplete="username" required autofocus>
        </label>
        <label class="field-inline">
          <span>密码</span>
          <input id="webui-password" name="password" type="password" autocomplete="current-password" required>
        </label>
        <button class="btn primary auth-submit" id="webui-login-submit" type="submit">进入面板</button>
        <div class="notice" id="webui-login-status" role="status" aria-live="polite"></div>
      </form>
    </section>
  </main>
  <script src="/static/login.js"></script>
</body>
</html>
