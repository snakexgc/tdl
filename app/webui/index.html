<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TDL 管理面板</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/base.css">
  <link rel="stylesheet" href="/static/css/dashboard.css">
  <link rel="stylesheet" href="/static/css/downloads.css">
  <link rel="stylesheet" href="/static/css/kv.css">
  <link rel="stylesheet" href="/static/css/user.css">
  <link rel="stylesheet" href="/static/css/config.css">
  <link rel="stylesheet" href="/static/css/modules.css">
  <link rel="stylesheet" href="/static/css/update.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">TDL</div>
        <div>
          <div class="brand-title">管理面板</div>
          <div class="brand-subtitle">Telegram Download Toolkit</div>
        </div>
      </div>
      <nav class="nav" aria-label="主菜单">
        <button class="nav-item active" data-view="dashboard" type="button">仪表盘</button>
        <button class="nav-item" data-view="user" type="button">用户管理</button>
        <button class="nav-item" data-view="config" type="button">配置文件</button>
        <button class="nav-item" data-view="downloads" type="button">下载管理</button>
        <button class="nav-item" data-view="kv" type="button">KV 管理</button>
        <button class="nav-item" data-view="modules" type="button">模块管理</button>
        <button class="nav-item" data-view="update" type="button">检查更新</button>
      </nav>
      <div class="sidebar-foot">
        <div class="heartbeat" id="heartbeat-indicator" data-state="checking" role="status" aria-live="polite">
          <span class="heartbeat-dot" aria-hidden="true"></span>
          <span id="heartbeat-label">TDL 连接中</span>
        </div>
        <div id="runtime-version">版本：-</div>
        <div id="runtime-namespace">数据空间：-</div>
        <div id="runtime-watch">监听：-</div>
        <button class="sidebar-logout" id="logout" type="button">退出登录</button>
      </div>
    </aside>

    <main class="main">
      <div class="credential-warning" id="credential-warning" role="alert" hidden>
        <div>
          <strong>正在使用默认 WebUI 管理员账号：admin / admin。</strong>
          <span>请立刻修改用户名和密码：从侧边栏进入“配置文件”，填写新的用户名和密码，保存后重启TDL使用新凭据重新登录!</span>
        </div>
        <button class="btn danger" id="credential-warning-action" type="button">去修改</button>
      </div>
      <div id="view-host" aria-live="polite">
        <div class="view-loading">正在载入管理面板...</div>
      </div>
    </main>
  </div>

  <script type="module" src="/static/js/main.js"></script>
</body>
</html>
