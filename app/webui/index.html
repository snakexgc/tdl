<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TDL 管理面板</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">TDL</div>
        <div>
          <div class="brand-title">管理面板</div>
          <div class="brand-subtitle">Telegram Download Toolkit</div>
        </div>
      </div>
      <nav class="nav" aria-label="主菜单">
        <button class="nav-item active" data-view="user" type="button">用户管理</button>
        <button class="nav-item" data-view="config" type="button">配置文件</button>
        <button class="nav-item" data-view="downloads" type="button">下载管理</button>
        <button class="nav-item" data-view="kv" type="button">KV 管理</button>
        <button class="nav-item" data-view="modules" type="button">模块管理</button>
        <button class="nav-item" data-view="update" type="button">检查更新</button>
      </nav>
      <div class="sidebar-foot">
        <div class="heartbeat" id="heartbeat-indicator" data-state="checking" role="status" aria-live="polite">
          <span class="heartbeat-dot" aria-hidden="true"></span>
          <span id="heartbeat-label">TDL 连接中</span>
        </div>
        <div id="runtime-version">版本：-</div>
        <div id="runtime-namespace">数据空间：-</div>
        <div id="runtime-watch">监听：-</div>
        <button class="sidebar-logout" id="logout" type="button">退出登录</button>
      </div>
    </aside>

    <main class="main" id="view-host" aria-live="polite">
      <div class="view-loading">正在载入管理面板...</div>
    </main>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
