name: docker

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build"
        required: true
        default: "master"
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - name: Docker metadata
        id: meta
        shell: bash
        run: |
          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          ref_name="${GITHUB_REF_NAME}"
          sha_short="$(git rev-parse --short HEAD)"

          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
            ref_name="${{ inputs.ref }}"
          fi

          ref_name="${ref_name#refs/tags/}"
          ref_name="${ref_name#refs/heads/}"
          version="${ref_name#v}"
          tag_name="${ref_name//\//-}"
          tag_name="${tag_name//+/-}"
          version_tag="${version//+/-}"
          {
            echo "version=$version"
            echo "tags<<EOF"
            echo "${image}:${tag_name}"
            if [[ "$version" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)([+-].*)?$ ]]; then
              echo "${image}:${version_tag}"
              if [[ "$version" != *-* ]]; then
                echo "${image}:${BASH_REMATCH[1]}.${BASH_REMATCH[2]}"
                echo "${image}:latest"
              fi
            fi
            echo "${image}:sha-${sha_short}"
            echo "EOF"
            echo "labels<<EOF"
            echo "org.opencontainers.image.title=${GITHUB_REPOSITORY#*/}"
            echo "org.opencontainers.image.source=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}"
            echo "org.opencontainers.image.url=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}"
            echo "org.opencontainers.image.version=${version}"
            echo "org.opencontainers.image.revision=${GITHUB_SHA}"
            echo "org.opencontainers.image.created=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract build args
        id: args
        shell: bash
        run: |
          echo "commit=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "commit_date=$(git show -s --format=%cI)" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            COMMIT=${{ steps.args.outputs.commit }}
            COMMIT_DATE=${{ steps.args.outputs.commit_date }}
          platforms: linux/amd64,linux/arm64,linux/arm/v7,linux/arm/v6
          push: true
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
